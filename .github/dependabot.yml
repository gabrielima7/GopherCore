version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    reviewers:
      - "gabrielima7"
    labels:
      - "dependencies"
      - "go"
    groups:
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "gabrielima7"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
