name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────────
  # Linting
  # ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          $(go env GOPATH)/bin/golangci-lint run ./...

  # ──────────────────────────────────────────────────
  # Tests (cross-platform)
  # ──────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        shell: bash
        run: go test -cover -race -count=1 -timeout=120s -coverprofile coverage.out ./...

      - name: Upload coverage (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  # ──────────────────────────────────────────────────
  # Fuzz Tests
  # ──────────────────────────────────────────────────
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: go mod download

      - name: Fuzz result
        run: go test -fuzz=. -fuzztime=60s ./result/

      - name: Fuzz retry
        run: go test -fuzz=. -fuzztime=60s ./retry/

      - name: Fuzz circuitbreaker
        run: go test -fuzz=. -fuzztime=60s ./circuitbreaker/

      - name: Fuzz guard
        run: go test -fuzz=. -fuzztime=60s ./guard/

      - name: Fuzz jsonutil
        run: go test -fuzz=. -fuzztime=60s ./jsonutil/

  # ──────────────────────────────────────────────────
  # Security Analysis (gosec)
  # ──────────────────────────────────────────────────
  security:
    name: Security (gosec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: go mod download

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"gosec","rules":[]}},"results":[]}]}' > results.sarif
          $(go env GOPATH)/bin/gosec -fmt sarif -out results.sarif -quiet ./...

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif

  # ──────────────────────────────────────────────────
  # Vulnerability Check (govulncheck)
  # ──────────────────────────────────────────────────
  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
