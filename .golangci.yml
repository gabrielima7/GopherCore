
run:
  timeout: 5m
  tests: true
  go: "1.26"

linters:
  enable:
    - errcheck
    - nilerr
    - staticcheck
    - govet
    - gosimple
    - unused
    - ineffassign
    - typecheck

issues:
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
