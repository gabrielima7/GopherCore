version: "2"

run:
  timeout: 5m
  tests: true
  go: "1.26"

linters:
  enable:
    - errcheck
    - nilnil
    - nilerr
    - staticcheck
    - govet
    - unused
    - ineffassign
  settings:
    govet:
      enable:
        - nilness

issues:
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

output:
  formats:
    text:
      path: stdout
      colors: true
  print-issued-lines: true
  print-linter-name: true
